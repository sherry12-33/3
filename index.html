<!DOCTYPE html>
<meta charset="utf-8">
<title>打分系统</title>
<style>
body{max-width:450px;margin:30px auto;padding:0 20px;font-family:Arial}
input,button{width:100%;margin:8px 0;padding:10px;font-size:16px}
button{background:#007aff;color:white;border:none;border-radius:6px}
.del{background:#ff3b30;padding:6px 10px;font-size:14px}
.list{margin:10px 0;padding:10px;border:1px solid #ddd;border-radius:6px}
</style>

被打分人姓名：
<input id="target" placeholder="请输入被打分人姓名">

打分人姓名：
<input id="user" placeholder="请输入你的姓名">

分数（1-100整数）：
<input id="score" placeholder="只能填整数，无小数点">

<button onclick="submit()">提交</button>
<div id="msg"></div>

<button onclick="admin()" style="margin-top:30px;background:#666">管理员查看</button>
<div id="listArea"></div>

<script>
let data = JSON.parse(localStorage.getItem('data') || '[]')

function submit() {
  const target = document.getElementById('target').value.trim()
  const user = document.getElementById('user').value.trim()
  const score = document.getElementById('score').value.trim()

  if (!target || !user || !score) {
    document.getElementById('msg').innerText = '请填写完整'
    return
  }

  const num = parseInt(score)
  if (isNaN(num) || num < 1 || num > 100) {
    document.getElementById('msg').innerText = '请输入1-100整数'
    return
  }

  const exist = data.some(item => item.target == target && item.user == user)
  if (exist) {
    document.getElementById('msg').innerText = '你已给该同学打过分'
    return
  }

  data.push({ target, user, score: num })
  localStorage.setItem('data', JSON.stringify(data))
  document.getElementById('msg').innerText = '提交成功'
  
  document.getElementById('target').value = ''
  document.getElementById('user').value = ''
  document.getElementById('score').value = ''
}

function admin() {
  const pwd = prompt('请输入管理密码：')
  if (pwd !== '123456') {
    alert('密码错误')
    return
  }

  showList()
}

function showList() {
  const area = document.getElementById('listArea')
  if (data.length === 0) {
    area.innerHTML = '暂无打分记录'
    return
  }

  let html = `<h3>总打分人数：${data.length} 人</h3>`

  data.forEach((item, index) => {
    html += `
    <div class="list">
      被打分人：${item.target}<br>
      打分人：${item.user}<br>
      分数：${item.score}<br>
      <button class="del" onclick="del(${index})">删除这条记录</button>
    </div>`
  })

  const persons = {}
  data.forEach(({ target, score }) => {
    if (!persons[target]) persons[target] = []
    persons[target].push(score)
  })

  html += `<h3>平均分统计：</h3>`
  for (let name in persons) {
    const list = persons[name]
    const total = list.reduce((a,b)=>a+b,0)
    const avg = (total / list.length).toFixed(1)
    html += `${name}：${avg} 分<br>`
  }

  area.innerHTML = html
}

function del(index) {
  if (!confirm('确定删除这条记录吗？')) return
  data.splice(index, 1)
  localStorage.setItem('data', JSON.stringify(data))
  alert('已删除')
  showList()
}
</script>
